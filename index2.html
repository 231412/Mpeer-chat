<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <!-- 移动端 viewport 适配 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>MgChat</title>
  <!-- PeerJS -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent; /* 去掉移动端点击灰色背景 */
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: flex-start;  /* 顶部对齐，防止键盘顶起时内容被压缩 */
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      padding: constant(safe-area-inset-top) constant(safe-area-inset-right) constant(safe-area-inset-bottom) constant(safe-area-inset-left);
      margin: 0;
    }
    .container {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 28px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      padding: 20px 16px;
      margin: 12px;  /* 四周留边距，更舒适 */
      transition: all 0.2s;
    }
    h2 {
      text-align: center;
      margin-bottom: 14px;
      color: #1e293b;
      font-weight: 600;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
    }
    .status {
      background: #eef2ff;
      color: #4f46e5;
      padding: 12px 16px;
      border-radius: 40px;
      font-size: 15px;
      margin-bottom: 18px;
      text-align: center;
      font-weight: 500;
      word-break: break-word;
      border: 1px solid rgba(79, 70, 229, 0.15);
    }
    /* 输入面板 */
    .id-panel {
      background: #f8fafc;
      border-radius: 24px;
      padding: 18px 16px;
      margin-bottom: 16px;
      border: 1.5px solid #e2e8f0;
    }
    .input-group {
      margin-bottom: 16px;
    }
    .input-group label {
      display: block;
      font-size: 15px;
      font-weight: 500;
      color: #334155;
      margin-bottom: 6px;
      margin-left: 6px;
    }
    .input-group input {
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid #e2e8f0;
      border-radius: 40px;
      font-size: 16px;       /* 防止 iOS 自动缩放 */
      outline: none;
      background: white;
      transition: border 0.15s;
      text-align: center;
      font-weight: 500;
      -webkit-appearance: none;
      appearance: none;
    }
    .input-group input:focus {
      border-color: #4f46e5;
    }
    .input-group input::placeholder {
      font-weight: 400;
      color: #94a3b8;
      font-size: 15px;
    }
    /* 按钮基础样式 (移动端加大触控区域) */
    .btn {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 14px 22px;
      border-radius: 44px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s;
      white-space: nowrap;
      width: 100%;
      min-height: 52px;       /* 保证点击区域高度 */
      box-shadow: 0 4px 8px rgba(79, 70, 229, 0.2);
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
    }
    .btn:active {
      background: #4338ca;
      transform: scale(0.98);
    }
    .btn.secondary {
      background: #f1f5f9;
      color: #1e293b;
      box-shadow: none;
    }
    .btn.secondary:active {
      background: #e2e8f0;
    }
    .btn:disabled {
      opacity: 0.5;
      pointer-events: none;
      box-shadow: none;
    }
    /* 聊天区域 */
    .chat-box {
      border: 1.5px solid #e2e8f0;
      border-radius: 24px;
      height: 380px;          /* 固定高度，配合 flex 布局 */
      max-height: 60vh;       /* 视口高度适配，防止键盘弹出时挤压 */
      overflow-y: auto;
      padding: 18px 14px;
      margin-bottom: 16px;
      background: #fafbfc;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch; /* iOS 顺滑滚动 */
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 22px;
      word-break: break-word;
      font-size: 16px;
      line-height: 1.4;
    }
    .message.self {
      align-self: flex-end;
      background: #4f46e5;
      color: white;
      border-bottom-right-radius: 6px;
    }
    .message.peer {
      align-self: flex-start;
      background: white;
      border: 1px solid #e2e8f0;
      color: #1e293b;
      border-bottom-left-radius: 6px;
    }
    .message.system {
      align-self: center;
      background: #eef2ff;
      color: #4f46e5;
      font-size: 14px;
      padding: 6px 18px;
      border-radius: 30px;
      font-weight: 500;
      max-width: 90%;
    }
    .input-area {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input-area input {
      flex: 1;
      padding: 14px 18px;
      border: 1.5px solid #e2e8f0;
      border-radius: 44px;
      font-size: 16px;
      outline: none;
      background: white;
      -webkit-appearance: none;
      appearance: none;
    }
    .input-area input:focus {
      border-color: #4f46e5;
    }
    .input-area .btn {
      width: auto;
      padding: 14px 24px;
      min-height: 52px;
    }
    .hidden {
      display: none !important;
    }
    .reconnect-hint {
      margin-top: 12px;
      font-size: 14px;
      color: #64748b;
      text-align: center;
    }
    .divider {
      display: flex;
      align-items: center;
      color: #94a3b8;
      font-size: 14px;
      margin: 14px 0;
    }
    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }
    .divider span {
      margin: 0 14px;
    }
    /* 断开按钮的容器 */
    .action-footer {
      margin-top: 14px;
      text-align: center;
    }
    .action-footer .btn {
      width: auto;
      padding: 12px 28px;
      min-height: 48px;
    }
    /* 移动端优化：状态栏字体可稍小 */
    @media (max-width: 400px) {
      .container { padding: 16px 12px; }
      h2 { font-size: 1.5rem; }
      .status { font-size: 14px; }
    }
  </style>
</head>
<body>
<div class="container">
  <h2>💬MgChat</h2>
  <div id="statusArea" class="status">⚡ 输入双方 ID 开始</div>

  <!-- ID 输入面板 -->
  <div id="idPanel" class="id-panel">
    <div class="input-group">
      <label>👤 你的 ID</label>
      <input type="text" id="myIdInput" placeholder="例如: alice" autocomplete="off" autocapitalize="none" spellcheck="false" enterkeyhint="next">
    </div>
    <div class="input-group">
      <label>🎯 对方的 ID</label>
      <input type="text" id="targetIdInput" placeholder="例如: bob" autocomplete="off" autocapitalize="none" spellcheck="false" enterkeyhint="go">
    </div>
    <button class="btn" id="connectBtn">🔗 开始连接</button>
    <div class="divider"><span>或</span></div>
    <button class="btn secondary" id="resetAndChangeBtn">🔄 更换 ID</button>
    <div class="reconnect-hint">
      ⚡ 双方填写对方的 ID 后点击连接
    </div>
  </div>

  <!-- 聊天区域 (初始隐藏) -->
  <div id="chatPanel" class="hidden">
    <div id="chatBox" class="chat-box">
      <div class="message system">✨ 连接后即可聊天</div>
    </div>

    <div class="input-area">
      <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off" enterkeyhint="send" disabled>
      <button class="btn" id="sendBtn" disabled>发送</button>
    </div>
    <div class="action-footer">
      <button class="btn secondary" id="leaveBtn">🚪 断开并更换 ID</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- 配置 ----------
    const iceServers = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
        { urls: 'stun:stun3.l.google.com:19302' },
        { urls: 'stun:stun4.l.google.com:19302' }
      ]
    };

    // ---------- DOM 元素 ----------
    const statusArea = document.getElementById('statusArea');
    const idPanel = document.getElementById('idPanel');
    const chatPanel = document.getElementById('chatPanel');
    const chatBox = document.getElementById('chatBox');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const connectBtn = document.getElementById('connectBtn');
    const resetAndChangeBtn = document.getElementById('resetAndChangeBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const myIdInput = document.getElementById('myIdInput');
    const targetIdInput = document.getElementById('targetIdInput');

    // ---------- 全局变量 ----------
    let peer = null;
    let conn = null;
    let connectedToPeer = false;
    let currentMyId = '';
    let currentTargetId = '';

    // ---------- 辅助函数 ----------
    function addMessage(text, type = 'system') {
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', type);
      msgDiv.textContent = text;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function updateStatus(text) {
      statusArea.textContent = text;
    }

    function enableChatUI(enabled) {
      messageInput.disabled = !enabled;
      sendBtn.disabled = !enabled;
    }

    function switchToChatMode(myId, targetId) {
      idPanel.classList.add('hidden');
      chatPanel.classList.remove('hidden');
      currentMyId = myId;
      currentTargetId = targetId;
      updateStatus(`🟢 在线 (${myId}) · 与 ${targetId} 聊天中`);
    }

    function resetToIdMode() {
      if (conn) {
        try { conn.close(); } catch(e) {}
        conn = null;
      }
      if (peer) {
        try { peer.destroy(); } catch(e) {}
        peer = null;
      }
      chatPanel.classList.add('hidden');
      idPanel.classList.remove('hidden');
      connectedToPeer = false;
      enableChatUI(false);
      updateStatus('⚡ 输入 ID 开始连接');
    }

    function fullReset() {
      myIdInput.value = '';
      targetIdInput.value = '';
      resetToIdMode();
      chatBox.innerHTML = '<div class="message system">✨ 连接后即可聊天</div>';
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      if (!conn || !connectedToPeer) {
        addMessage('⚠️ 未连接到对方', 'system');
        return;
      }
      conn.send(text);
      addMessage(text, 'self');
      messageInput.value = '';
    }

    function setupConnection(connection) {
      connection.on('open', () => {
        updateStatus(`🟢 已连接到 ${currentTargetId}`);
        connectedToPeer = true;
        enableChatUI(true);
        addMessage(`🎉 成功连接 ${currentTargetId}`, 'system');
        messageInput.focus();
      });

      connection.on('data', (data) => {
        addMessage(data, 'peer');
      });

      connection.on('close', () => {
        if (connectedToPeer) {
          addMessage(`📭 ${currentTargetId} 已断开`, 'system');
        }
        updateStatus(`🔌 连接断开`);
        connectedToPeer = false;
        enableChatUI(false);
      });

      connection.on('error', (err) => {
        console.error('连接错误:', err);
        addMessage(`❌ 连接出错`, 'system');
        updateStatus('❌ 连接失败');
        connectedToPeer = false;
        enableChatUI(false);
      });
    }

    function connectToPeer(targetId) {
      if (!peer) return;
      updateStatus(`🔗 正在连接 ${targetId} ...`);
      conn = peer.connect(targetId, {
        reliable: true,
        serialization: 'json'
      });
      setupConnection(conn);
    }

    function initializeAndConnect(myId, targetId) {
      if (peer) peer.destroy();
      updateStatus('⏳ 连接信令服务器...');
      
      peer = new Peer(myId, {
        config: iceServers,
        debug: 1
      });

      peer.on('open', (id) => {
        currentMyId = id;
        updateStatus(`✅ 已上线 (${id})，等待与 ${targetId} 建立连接...`);
        addMessage(`🔑 你的 ID: ${id}`, 'system');
        connectToPeer(targetId);
      });

      peer.on('connection', (incomingConn) => {
        if (conn) conn.close();
        conn = incomingConn;
        setupConnection(conn);
        if (chatPanel.classList.contains('hidden')) {
          switchToChatMode(myId, targetId);
        }
      });

      peer.on('error', (err) => {
        console.error('PeerJS 错误:', err);
        let errorMsg = err.type;
        if (err.type === 'peer-unavailable') errorMsg = '对方 ID 不在线';
        else if (err.type === 'unavailable-id') errorMsg = `ID "${myId}" 已被占用`;
        updateStatus(`❌ 错误: ${errorMsg}`);
        addMessage(`❌ ${errorMsg}`, 'system');
        resetToIdMode();
      });

      peer.on('disconnected', () => {
        updateStatus('🔌 与服务器断开');
      });

      peer.on('close', () => {
        updateStatus('⏹️ 连接已关闭');
      });
    }

    // ---------- 事件绑定 ----------
    connectBtn.addEventListener('click', () => {
      const myId = myIdInput.value.trim();
      const targetId = targetIdInput.value.trim();
      if (!myId || !targetId) {
        alert('请填写自己和对方的 ID');
        return;
      }
      if (myId === targetId) {
        alert('自己的 ID 和对方的 ID 不能相同');
        return;
      }
      chatBox.innerHTML = '<div class="message system">⏳ 正在建立通讯...</div>';
      switchToChatMode(myId, targetId);
      initializeAndConnect(myId, targetId);
    });

    resetAndChangeBtn.addEventListener('click', fullReset);
    leaveBtn.addEventListener('click', fullReset);

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
      }
    });

    targetIdInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        connectBtn.click();
      }
    });
    myIdInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        targetIdInput.focus();
      }
    });

    updateStatus('⚡ 输入双方 ID，开始聊天');
    
    // URL 参数预填
    const urlParams = new URLSearchParams(window.location.search);
    const urlMyId = urlParams.get('myid');
    const urlTargetId = urlParams.get('target');
    if (urlMyId) myIdInput.value = urlMyId;
    if (urlTargetId) targetIdInput.value = urlTargetId;
  })();
</script>
</body>
</html>

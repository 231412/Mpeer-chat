<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>Mgchat</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      margin: 0;
    }
    .container {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 28px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      padding: 20px 16px;
      margin: 12px;
    }
    h2 {
      text-align: center;
      margin-bottom: 14px;
      color: #1e293b;
      font-weight: 600;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
    }
    .status {
      background: #eef2ff;
      color: #4f46e5;
      padding: 12px 16px;
      border-radius: 40px;
      font-size: 15px;
      margin-bottom: 18px;
      text-align: center;
      font-weight: 500;
      word-break: break-word;
      border: 1px solid rgba(79, 70, 229, 0.15);
    }
    /* 面板 */
    .panel {
      background: #f8fafc;
      border-radius: 24px;
      padding: 18px 16px;
      margin-bottom: 16px;
      border: 1.5px solid #e2e8f0;
    }
    .input-group {
      margin-bottom: 16px;
    }
    .input-group label {
      display: block;
      font-size: 15px;
      font-weight: 500;
      color: #334155;
      margin-bottom: 6px;
      margin-left: 6px;
    }
    .input-group input {
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid #e2e8f0;
      border-radius: 40px;
      font-size: 16px;
      outline: none;
      background: white;
      transition: border 0.15s;
      text-align: center;
      font-weight: 500;
      -webkit-appearance: none;
      appearance: none;
    }
    .input-group input:focus {
      border-color: #4f46e5;
    }
    .input-group input::placeholder {
      font-weight: 400;
      color: #94a3b8;
      font-size: 15px;
    }
    .btn {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 14px 22px;
      border-radius: 44px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s;
      width: 100%;
      min-height: 52px;
      box-shadow: 0 4px 8px rgba(79, 70, 229, 0.2);
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
      margin-bottom: 12px;
    }
    .btn:active {
      background: #4338ca;
      transform: scale(0.98);
    }
    .btn.secondary {
      background: #f1f5f9;
      color: #1e293b;
      box-shadow: none;
    }
    .btn.secondary:active {
      background: #e2e8f0;
    }
    .btn:disabled {
      opacity: 0.5;
      pointer-events: none;
      box-shadow: none;
    }
    .btn-group {
      display: flex;
      gap: 10px;
    }
    .btn-group .btn {
      flex: 1;
    }
    /* 聊天区域 */
    .chat-box {
      border: 1.5px solid #e2e8f0;
      border-radius: 24px;
      height: 380px;
      max-height: 60vh;
      overflow-y: auto;
      padding: 18px 14px;
      margin-bottom: 16px;
      background: #fafbfc;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 22px;
      word-break: break-word;
      font-size: 16px;
      line-height: 1.4;
    }
    .message.self {
      align-self: flex-end;
      background: #4f46e5;
      color: white;
      border-bottom-right-radius: 6px;
    }
    .message.peer {
      align-self: flex-start;
      background: white;
      border: 1px solid #e2e8f0;
      color: #1e293b;
      border-bottom-left-radius: 6px;
    }
    .message.system {
      align-self: center;
      background: #eef2ff;
      color: #4f46e5;
      font-size: 14px;
      padding: 6px 18px;
      border-radius: 30px;
      font-weight: 500;
      max-width: 90%;
    }
    .input-area {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input-area input {
      flex: 1;
      padding: 14px 18px;
      border: 1.5px solid #e2e8f0;
      border-radius: 44px;
      font-size: 16px;
      outline: none;
      background: white;
      -webkit-appearance: none;
    }
    .input-area input:focus {
      border-color: #4f46e5;
    }
    .input-area .btn {
      width: auto;
      padding: 14px 24px;
      margin-bottom: 0;
    }
    .hidden {
      display: none !important;
    }
    .info-tip {
      background: #fff8e5;
      border-radius: 20px;
      padding: 12px 16px;
      font-size: 14px;
      color: #92400e;
      margin: 12px 0;
      text-align: center;
    }
    .action-footer {
      margin-top: 14px;
      text-align: center;
    }
    .action-footer .btn {
      width: auto;
      padding: 12px 28px;
    }
    .my-id-display {
      font-size: 22px;
      font-weight: 700;
      background: white;
      padding: 8px 16px;
      border-radius: 40px;
      display: inline-block;
      margin: 8px 0;
      border: 1.5px solid #4f46e5;
      color: #4f46e5;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>💬 Mgchat</h2>
  <div id="statusArea" class="status">⚡ 输入你的 ID</div>

  <!-- 初始操作面板 -->
  <div id="setupPanel" class="panel">
    <div class="input-group">
      <label>👤 你的 ID</label>
      <input type="text" id="myIdInput" placeholder="请输入非中文文本" autocomplete="off" autocapitalize="none" spellcheck="false" enterkeyhint="done">
    </div>
    
    <button class="btn" id="goOnlineBtn">📡 上线并等待对方</button>
    
    <div style="margin: 16px 0; text-align: center; color: #64748b;">—— 或者 ——</div>
    
    <div class="input-group">
      <label>🎯 对方的 ID</label>
      <input type="text" id="targetIdInput" placeholder="输入已在线的对方 ID" autocomplete="off" autocapitalize="none" spellcheck="false" enterkeyhint="go">
    </div>
    <button class="btn secondary" id="connectToPeerBtn">🔗 连接对方</button>
    
    <div class="info-tip">
      💡 一方先「上线并等待」，<br>另一方输入对方的 ID 后「连接对方」
    </div>
  </div>

  <!-- 等待连接面板（已上线但对方未连入） -->
  <div id="waitingPanel" class="panel hidden">
    <div style="text-align: center;">
      <div style="font-size: 18px; margin-bottom: 12px;">📡 你已上线，等待对方连接</div>
      <div style="font-size: 14px; color: #475569; margin-bottom: 8px;">你的 ID 是</div>
      <div id="waitingMyIdDisplay" class="my-id-display">---</div>
      <div style="margin-top: 16px; font-size: 14px; color: #475569;">
        请告诉对方这个 ID，<br>让对方在下方输入并点击「连接对方」
      </div>
      <button class="btn secondary" id="cancelWaitingBtn" style="margin-top: 24px;">❌ 取消等待</button>
    </div>
  </div>

  <!-- 聊天面板 -->
  <div id="chatPanel" class="hidden">
    <div id="chatBox" class="chat-box">
      <div class="message system">✨ 连接后即可聊天</div>
    </div>

    <div class="input-area">
      <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off" enterkeyhint="send" disabled>
      <button class="btn" id="sendBtn" disabled>发送</button>
    </div>
    <div class="action-footer">
      <button class="btn secondary" id="leaveChatBtn">🚪 断开并返回</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- 配置 ----------
    const iceServers = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
        { urls: 'stun:stun3.l.google.com:19302' },
        { urls: 'stun:stun4.l.google.com:19302' }
      ]
    };

    // ---------- DOM 元素 ----------
    const statusArea = document.getElementById('statusArea');
    const setupPanel = document.getElementById('setupPanel');
    const waitingPanel = document.getElementById('waitingPanel');
    const chatPanel = document.getElementById('chatPanel');
    const chatBox = document.getElementById('chatBox');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    
    const myIdInput = document.getElementById('myIdInput');
    const targetIdInput = document.getElementById('targetIdInput');
    const goOnlineBtn = document.getElementById('goOnlineBtn');
    const connectToPeerBtn = document.getElementById('connectToPeerBtn');
    const cancelWaitingBtn = document.getElementById('cancelWaitingBtn');
    const leaveChatBtn = document.getElementById('leaveChatBtn');
    const waitingMyIdDisplay = document.getElementById('waitingMyIdDisplay');

    // ---------- 全局变量 ----------
    let peer = null;
    let conn = null;
    let connectedToPeer = false;
    let currentMyId = '';
    let currentTargetId = '';
    let isWaiting = false;      // 是否处于“上线等待”状态

    // ---------- 辅助函数 ----------
    function addMessage(text, type = 'system') {
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', type);
      msgDiv.textContent = text;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function updateStatus(text) {
      statusArea.textContent = text;
    }

    function enableChatUI(enabled) {
      messageInput.disabled = !enabled;
      sendBtn.disabled = !enabled;
    }

    // 切换到等待界面
    function showWaitingPanel(myId) {
      setupPanel.classList.add('hidden');
      waitingPanel.classList.remove('hidden');
      chatPanel.classList.add('hidden');
      waitingMyIdDisplay.textContent = myId;
      updateStatus(`📡 等待对方连接 (你的 ID: ${myId})`);
    }

    // 切换到聊天界面
    function showChatPanel(myId, targetId) {
      setupPanel.classList.add('hidden');
      waitingPanel.classList.add('hidden');
      chatPanel.classList.remove('hidden');
      currentMyId = myId;
      currentTargetId = targetId;
      updateStatus(`🟢 与 ${targetId} 聊天中`);
    }

    // 返回初始设置界面
    function resetToSetup() {
      // 关闭连接
      if (conn) {
        try { conn.close(); } catch(e) {}
        conn = null;
      }
      if (peer) {
        try { peer.destroy(); } catch(e) {}
        peer = null;
      }
      
      setupPanel.classList.remove('hidden');
      waitingPanel.classList.add('hidden');
      chatPanel.classList.add('hidden');
      connectedToPeer = false;
      isWaiting = false;
      enableChatUI(false);
      updateStatus('⚡ 输入你的 ID');
      
      // 不清空输入框，方便再次尝试
    }

    // 发送消息
    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      if (!conn || !connectedToPeer) {
        addMessage('⚠️ 未连接到对方', 'system');
        return;
      }
      conn.send(text);
      addMessage(text, 'self');
      messageInput.value = '';
    }

    // ---------- 连接核心逻辑 ----------
    function setupConnection(connection, targetId) {
      connection.on('open', () => {
        connectedToPeer = true;
        enableChatUI(true);
        addMessage(`🎉 成功连接到 ${targetId}`, 'system');
        showChatPanel(currentMyId, targetId);
        messageInput.focus();
      });

      connection.on('data', (data) => {
        addMessage(data, 'peer');
      });

      connection.on('close', () => {
        if (connectedToPeer) {
          addMessage(`📭 对方已断开`, 'system');
        }
        connectedToPeer = false;
        enableChatUI(false);
        // 不自动跳转，让用户手动返回
      });

      connection.on('error', (err) => {
        console.error('连接错误:', err);
        addMessage(`❌ 连接出错`, 'system');
        updateStatus('❌ 连接失败');
      });
    }

    // 初始化 Peer（仅上线，不主动连接）
    function goOnline(myId) {
      if (peer) peer.destroy();
      
      updateStatus('⏳ 连接信令服务器...');
      
      peer = new Peer(myId, {
        config: iceServers,
        debug: 1
      });

      peer.on('open', (id) => {
        currentMyId = id;
        isWaiting = true;
        showWaitingPanel(id);
        updateStatus(`✅ 已上线 (${id})，等待对方连接...`);
      });

      // 监听对方的连接请求
      peer.on('connection', (incomingConn) => {
        // 只接受第一个连接
        if (conn) {
          incomingConn.close();
          return;
        }
        conn = incomingConn;
        // 从连接的 metadata 或 peer 获取
        const targetId = conn.peer;
        currentTargetId = targetId;
        setupConnection(conn, targetId);
        
        // 如果还在等待界面，自动切换到聊天
        if (isWaiting) {
          isWaiting = false;
          showChatPanel(currentMyId, targetId);
        }
      });

      peer.on('error', (err) => {
        console.error('PeerJS 错误:', err);
        let errorMsg = err.type;
        if (err.type === 'unavailable-id') {
          errorMsg = `ID "${myId}" 已被占用，请换一个`;
        }
        updateStatus(`❌ 错误: ${errorMsg}`);
        resetToSetup();
      });

      peer.on('disconnected', () => {
        updateStatus('🔌 与信令服务器断开，尝试重连...');
      });
    }

    // 主动连接对方（对方必须已经上线）
    function connectToPeer(myId, targetId) {
      if (peer) peer.destroy();
      
      updateStatus('⏳ 连接信令服务器...');
      
      peer = new Peer(myId, {
        config: iceServers,
        debug: 1
      });

      peer.on('open', (id) => {
        currentMyId = id;
        updateStatus(`🔗 正在连接 ${targetId} ...`);
        
        // 主动发起连接
        conn = peer.connect(targetId, {
          reliable: true,
          serialization: 'json'
        });
        
        currentTargetId = targetId;
        setupConnection(conn, targetId);
        
        // 切换到聊天界面
        chatBox.innerHTML = '<div class="message system">⏳ 正在建立加密通道...</div>';
        showChatPanel(id, targetId);
      });

      peer.on('error', (err) => {
        console.error('PeerJS 错误:', err);
        let errorMsg = err.type;
        if (err.type === 'peer-unavailable') {
          errorMsg = `对方 ID "${targetId}" 不在线`;
        } else if (err.type === 'unavailable-id') {
          errorMsg = `ID "${myId}" 已被占用`;
        }
        updateStatus(`❌ 错误: ${errorMsg}`);
        alert(errorMsg);
        resetToSetup();
      });

      peer.on('connection', (incomingConn) => {
        // 如果对方同时也发起了连接，处理冲突
        if (conn && conn !== incomingConn) {
          incomingConn.close();
        }
      });
    }

    // ---------- 事件绑定 ----------
    goOnlineBtn.addEventListener('click', () => {
      const myId = myIdInput.value.trim();
      if (!myId) {
        alert('请输入你的 ID');
        return;
      }
      goOnline(myId);
    });

    connectToPeerBtn.addEventListener('click', () => {
      const myId = myIdInput.value.trim();
      const targetId = targetIdInput.value.trim();
      if (!myId) {
        alert('请输入你的 ID');
        return;
      }
      if (!targetId) {
        alert('请输入对方的 ID');
        return;
      }
      if (myId === targetId) {
        alert('自己的 ID 和对方的 ID 不能相同');
        return;
      }
      connectToPeer(myId, targetId);
    });

    cancelWaitingBtn.addEventListener('click', () => {
      resetToSetup();
    });

    leaveChatBtn.addEventListener('click', () => {
      resetToSetup();
      chatBox.innerHTML = '<div class="message system">✨ 连接后即可聊天</div>';
    });

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
      }
    });

    // 键盘快捷操作
    targetIdInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        connectToPeerBtn.click();
      }
    });
    myIdInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        goOnlineBtn.click();
      }
    });

    // 初始化状态
    updateStatus('⚡ 输入你的 ID');
    
    // URL 参数预填
    const urlParams = new URLSearchParams(window.location.search);
    const urlMyId = urlParams.get('myid');
    const urlTargetId = urlParams.get('target');
    if (urlMyId) myIdInput.value = urlMyId;
    if (urlTargetId) targetIdInput.value = urlTargetId;
  })();
</script>
</body>
</html>
